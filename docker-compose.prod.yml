services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto_research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crypto_research"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/crypto_research
      COINGECKO_BASE_URL: https://api.coingecko.com/api/v3
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REFRESH_TOKEN: ${REFRESH_TOKEN}
      CORS_ORIGINS: ${PUBLIC_ORIGIN}
      TRACKED_ASSET_COUNT: ${TRACKED_ASSET_COUNT:-100}
      CORE_TECHNICAL_SYMBOLS: ${CORE_TECHNICAL_SYMBOLS:-BTC,ETH}
      AUTO_REFRESH_ENABLED: ${AUTO_REFRESH_ENABLED:-true}
      AUTO_REFRESH_INTERVAL_MINUTES: ${AUTO_REFRESH_INTERVAL_MINUTES:-30}
      MARKET_SCAN_INTERVAL_MINUTES: ${MARKET_SCAN_INTERVAL_MINUTES:-30}
      CANDIDATE_SCAN_INTERVAL_MINUTES: ${CANDIDATE_SCAN_INTERVAL_MINUTES:-5}
      PAPER_POSITION_INTERVAL_MINUTES: ${PAPER_POSITION_INTERVAL_MINUTES:-5}
      TECHNICAL_REFRESH_INTERVAL_MINUTES: ${TECHNICAL_REFRESH_INTERVAL_MINUTES:-30}
      CANDIDATE_MIN_OPPORTUNITY_SCORE: ${CANDIDATE_MIN_OPPORTUNITY_SCORE:-75}
      TECHNICAL_REFRESH_LIMIT: ${TECHNICAL_REFRESH_LIMIT:-30}
      PAPER_ACCOUNT_BALANCE: ${PAPER_ACCOUNT_BALANCE:-10000}
      PAPER_MARGIN_PER_TRADE: ${PAPER_MARGIN_PER_TRADE:-500}
      PAPER_LEVERAGE: ${PAPER_LEVERAGE:-5}
      PAPER_MIN_OPPORTUNITY_SCORE: ${PAPER_MIN_OPPORTUNITY_SCORE:-80}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
